<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Placeholder — MVC architecture diagram">
  <rect width="1280" height="720" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="1279" height="719" fill="none" stroke="#e6e6e6"/>
  <g font-family="'Geist Mono', monospace" text-anchor="middle">
    <!-- Controller -->
    <rect x="490" y="70" width="300" height="90" rx="10" fill="#0a0a0a"/>
    <text x="640" y="108" font-size="22" letter-spacing="3" fill="#ffffff">CONTROLLER</text>
    <text x="640" y="136" font-size="14" letter-spacing="2" fill="#8b8f96">move · undo · resign</text>
    <!-- arrow -->
    <line x1="640" y1="160" x2="640" y2="230" stroke="#6b7077" stroke-width="2"/>
    <polygon points="640,240 633,226 647,226" fill="#6b7077"/>
    <!-- Model -->
    <rect x="440" y="240" width="400" height="150" rx="10" fill="#ffffff" stroke="#4f46e5" stroke-width="2"/>
    <text x="640" y="278" font-size="22" letter-spacing="3" fill="#4f46e5">MODEL — Chess</text>
    <text x="640" y="312" font-size="15" letter-spacing="1" fill="#0a0a0a">Board · Piece · Move · ScoreBoard</text>
    <text x="640" y="344" font-size="13" letter-spacing="1" fill="#6b7077">rules · shared_ptr ownership · undo stack</text>
    <text x="640" y="370" font-size="13" letter-spacing="1" fill="#6b7077">(knows nothing about the screen)</text>
    <!-- arrow down to views -->
    <line x1="640" y1="390" x2="640" y2="460" stroke="#6b7077" stroke-width="2"/>
    <polygon points="640,470 633,456 647,456" fill="#6b7077"/>
    <text x="690" y="430" font-size="13" letter-spacing="1" fill="#6b7077" text-anchor="start">Observer notify</text>
    <!-- Views -->
    <rect x="360" y="470" width="240" height="90" rx="10" fill="#f5f5f7" stroke="#e6e6e6"/>
    <text x="480" y="508" font-size="20" letter-spacing="3" fill="#0a0a0a">VIEW · Cli</text>
    <text x="480" y="536" font-size="13" letter-spacing="1" fill="#6b7077">terminal output</text>
    <rect x="680" y="470" width="240" height="90" rx="10" fill="#f5f5f7" stroke="#e6e6e6"/>
    <text x="800" y="508" font-size="20" letter-spacing="3" fill="#0a0a0a">VIEW · Gui</text>
    <text x="800" y="536" font-size="13" letter-spacing="1" fill="#6b7077">X11 graphics</text>
    <text x="640" y="660" font-size="18" letter-spacing="4" fill="#6b7077">PLACEHOLDER · REPLACE WITH REAL DIAGRAM</text>
  </g>
</svg>
