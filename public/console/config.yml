# Sveltia CMS — loaded at /console/. Commits markdown to src/content/projects/.
# Fields below mirror src/content.config.ts (the zod schema) 1:1.

backend:
  name: github
  repo: junsangyooo/junsangyooo.github.io
  branch: main
  # ▼▼▼ REPLACE after you deploy the auth worker (see step-by-step). e.g. https://sveltia-auth.<you>.workers.dev
  base_url: https://REPLACE-WITH-YOUR-AUTH-WORKER.workers.dev

# Uploaded thumbnails land in public/thumbnails and are referenced as /thumbnails/...
media_folder: public/thumbnails
public_folder: /thumbnails

collections:
  - name: projects
    label: Projects
    label_singular: Project
    folder: src/content/projects
    create: true
    delete: true
    slug: '{{slug}}'
    extension: md
    format: frontmatter
    summary: '{{title}} — {{category}} ({{year}})'
    sortable_fields: [order, year, title]
    fields:
      - { name: title, label: Title, widget: string }
      - { name: tagline, label: Tagline (one line), widget: string }
      - { name: category, label: Category, widget: select, options: [Websites, Applications, Tools] }
      - { name: thumbnail, label: Thumbnail, widget: image }
      - { name: role, label: Role, widget: string, required: false }
      - { name: team, label: Team size, widget: number, default: 1, value_type: int, min: 1 }
      - { name: year, label: Year, widget: number, value_type: int }
      - { name: stack, label: Stack (tags), widget: list, default: [], required: false }
      - { name: repo, label: GitHub URL, widget: string, required: false }
      - { name: demo, label: Demo URL, widget: string, required: false }
      - { name: featured, label: Featured, widget: boolean, default: false }
      - { name: order, label: 'Order (lower = higher in list)', widget: number, default: 999, value_type: int }
      - { name: body, label: 'Body (Problem / Approach / Outcome)', widget: markdown }
